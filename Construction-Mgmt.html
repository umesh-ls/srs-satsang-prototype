// Helper: get ZSP name for a subtype
const getZspForSubtype = (category, subtypeName) => {
  const cat = ISSUE_CATEGORIES[category];
  if (!cat) return null;
  const st = cat.subtypes.find(s => s.name === subtypeName);
  return st ? st.zsp : null;
};

// Helper: get ZC for an area

  const zc = ZONAL_COORDINATORS_MASTER.find(z => z.areas.includes(area));
  return zc ? zc.name : "Zonal Coordinator";
};

  if (role.key === "coordinator") {
    // ZC sees issues in their assigned areas (all categories)
    if (role.assignedAreas && role.assignedAreas.length > 0) {
      return items.filter(i => role.assignedAreas.includes(i.area));
    }
    if (role.assignedZones && role.assignedZones.length > 0) {
      return items.filter(i => role.assignedZones.includes(i.zone));
    }
    return items;
  }
  if (role.key === "zsp") {
    // ZSP sees issues across all zones (filtered by zone assignment)
    if (role.assignedZones && role.assignedZones.length > 0) {
      return items.filter(i => role.assignedZones.includes(i.zone));
    }
    return items;
  }
  if (role.key === "state") return items.filter(i => i.state === role.state);
  if (role.key === "satsang") return items.filter(i => i.sp === role.sp);
  return items.filter(i => i[field] === role.area);
}

const { useState, useMemo, useCallback } = React;

// ─── MOCK DATA ────────────────────────────────────────────────────

  { id: 2, name: "Zone-II" },

const STATES = [

  { id: 2, name: "Haryana", zoneId: 2 },
  { id: 3, name: "Rajasthan", zoneId: 2 },

  { id: 6, name: "Maharashtra", zoneId: 3 },

const AREAS = [
  { id: 101, name: "Ludhiana", stateId: 1 },
  { id: 102, name: "Amritsar", stateId: 1 },
  { id: 103, name: "Jalandhar", stateId: 1 },
  { id: 104, name: "Panchkula", stateId: 2 },
  { id: 105, name: "Hisar", stateId: 2 },
  { id: 106, name: "Jaipur", stateId: 3 },
  { id: 107, name: "Lucknow", stateId: 4 },
  { id: 108, name: "Bhopal", stateId: 5 },
  { id: 109, name: "Mumbai", stateId: 6 },
  { id: 110, name: "Ahmedabad", stateId: 7 },

  { id: 113, name: "New Delhi", stateId: 10 },

const CENTRES = [
  { id: 1001, name: "Ludhiana Main", type: "Major Centre", areaId: 101 },
  { id: 1002, name: "Khanna", type: "Centre", areaId: 101 },
  { id: 1003, name: "Jagraon", type: "Centre", areaId: 101 },
  { id: 1004, name: "Amritsar Main", type: "Major Centre", areaId: 102 },
  { id: 1005, name: "Tarn Taran", type: "Centre", areaId: 102 },
  { id: 1006, name: "Jalandhar Main", type: "Major Centre", areaId: 103 },
  { id: 1007, name: "Panchkula Main", type: "Centre", areaId: 104 },
  { id: 1008, name: "Hisar Main", type: "Centre", areaId: 105 },
  { id: 1009, name: "Jaipur Main", type: "Major Centre", areaId: 106 },
  { id: 1010, name: "Lucknow Main", type: "Major Centre", areaId: 107 },
  { id: 1011, name: "Bhopal Main", type: "Centre", areaId: 108 },
  { id: 1012, name: "Mumbai Main", type: "Major Centre", areaId: 109 },
  { id: 1013, name: "Ahmedabad Main", type: "Major Centre", areaId: 110 },
  { id: 1014, name: "Bengaluru Main", type: "Major Centre", areaId: 111 },
  { id: 1015, name: "Chennai Main", type: "Major Centre", areaId: 112 },
  { id: 1016, name: "New Delhi Main", type: "Major Centre", areaId: 113 },
];

const CASE_TYPES = ["Civil", "Criminal", "Revenue", "Writ Petition", "Consumer", "Other"];
const DIRECTIONS = ["Filed Against Us", "Filed By Us"];
const PRIORITIES = ["Critical", "High", "Normal"];
const STATUSES = ["New", "Active", "Adjourned", "Reserved for Order", "Stayed / Injunction", "Disposed", "Escalated"];
const ADJOURNMENT_REASONS = [
  { code: "OPP_ABSENT", label: "Opposing Party Absent", cause: "Other party" },
  { code: "OUR_REQUEST", label: "Our Side Requested Time", cause: "Our side" },
  { code: "EVIDENCE_PENDING", label: "Evidence / Documents Pending", cause: "Either" },
  { code: "JUDGE_LEAVE", label: "Judge on Leave / Transferred", cause: "Court" },
  { code: "COURT_CONGESTION", label: "Court Congestion / Board Heavy", cause: "Court" },
  { code: "MEDIATION", label: "Mediation / Settlement Talk", cause: "Both" },
  { code: "PROCEDURAL", label: "Procedural / Compliance", cause: "Process" },
  { code: "ADVOCATE_NA", label: "Advocate Not Available", cause: "Advocate" },
  { code: "OTHER", label: "Other", cause: "Varies" },
];

const COURTS = [
  "Civil Court, Ludhiana", "District Court, Ludhiana", "High Court, Chandigarh",
  "Sessions Court, Amritsar", "Revenue Court, Jalandhar", "Tehsildar, Khanna",
  "District Court, Jaipur", "High Court, Rajasthan", "Civil Court, Lucknow",
  "High Court, Allahabad", "Bombay High Court", "District Court, Ahmedabad",
  "High Court, Karnataka", "Madras High Court", "Supreme Court of India",
  "SDM Court, Panchkula", "Consumer Forum, Delhi", "District Court, Hisar",
];

const ADVOCATES = [
  "Sh. Rajinder Mohan", "Sh. Baldev Singh", "Sh. Suresh Khanna", "Sh. Arun Jaitley",
  "Sh. Pradeep Sharma", "Sh. Vikram Chauhan", "Sh. Mohan Lal Gupta", "Sh. Harish Rao",
  "Sh. Deepak Verma", "Ms. Sunita Arora", "Sh. Ramesh Chand", "Sh. Naresh Kumar",
];

const OPPOSING_PARTIES = [
  "Sh. Gurbachan Singh", "Smt. Kamla Devi", "Punjab State Govt.", "Sh. Rattan Lal",
  "M/s Sunrise Builders", "Sh. Mohinder Pal", "Municipal Corporation", "Sh. Surinder Kumar",
  "Rajasthan Revenue Dept.", "Sh. Ashok Mehta", "Maharashtra PWD", "Sh. Kishan Chand",
  "Delhi Development Authority", "Sh. Balbir Singh", "Tamil Nadu Land Board",
];

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[rand(0, arr.length - 1)]; }
function generateCaseId(zoneId, stateAbbr, areaAbbr, year, num) {
  return "LC-Z" + zoneId + "-" + stateAbbr + "-" + areaAbbr + "-" + year + "-" + String(num).padStart(4, "0");
}

const STATE_ABBR = { Punjab: "PB", Haryana: "HR", Rajasthan: "RJ", "Uttar Pradesh": "UP", "Madhya Pradesh": "MP", Maharashtra: "MH", Gujarat: "GJ", Karnataka: "KA", "Tamil Nadu": "TN", Delhi: "DL" };
const AREA_ABBR = { Ludhiana: "LDH", Amritsar: "ASR", Jalandhar: "JLR", Panchkula: "PKL", Hisar: "HSR", Jaipur: "JPR", Lucknow: "LKO", Bhopal: "BPL", Mumbai: "MUM", Ahmedabad: "AMD", Bengaluru: "BLR", Chennai: "CHN", "New Delhi": "NDL" };

// Generate 45 realistic mock cases spread across all zones
const MOCK_CASES = (function() {
  var cases = [];
  var num = 1;
  CENTRES.forEach(function(centre) {
    var area = AREAS.find(function(a) { return a.id === centre.areaId; });
    var state = STATES.find(function(s) { return s.id === area.stateId; });
    var zone = ZONES.find(function(z) { return z.id === state.zoneId; });
    var count = centre.type === "Major Centre" ? rand(3, 5) : rand(1, 3);
    for (var i = 0; i < count; i++) {
      var year = pick([2023, 2024, 2025, 2026]);
      var caseType = pick(CASE_TYPES);
      var status = pick(STATUSES);
      var direction = pick(DIRECTIONS);
      var priority = caseType === "Writ Petition" || COURTS[rand(0, COURTS.length - 1)].includes("High Court") || COURTS[rand(0, COURTS.length - 1)].includes("Supreme") ? pick(["Critical", "High"]) : pick(PRIORITIES);
      var filedDate = year + "-" + String(rand(1, 12)).padStart(2, "0") + "-" + String(rand(1, 28)).padStart(2, "0");
      var hearingCount = rand(2, 12);
      var hearings = [];
      var hDate = new Date(filedDate);
      for (var h = 0; h < hearingCount; h++) {
        hDate = new Date(hDate.getTime() + rand(14, 60) * 86400000);
        var adjReason = h < hearingCount - 1 ? pick(ADJOURNMENT_REASONS) : null;
        hearings.push({
          id: h + 1,
          date: hDate.toISOString().slice(0, 10),
          summary: h === 0 ? "First hearing. Notice issued to opposite party." :
            h === hearingCount - 1 && status === "Disposed" ? "Final arguments heard. Order pronounced." :
            adjReason ? "Adjourned — " + adjReason.label.toLowerCase() + "." : "Arguments heard. Matter progressed.",
          adjournmentReason: adjReason,
          nextDate: null,
          actionItems: h < hearingCount - 1 ? pick(["File reply by next date", "Submit evidence", "Arrange witness", "File written arguments", "Obtain certified copy of order", ""]) : "",
        });
      }
      for (var h2 = 0; h2 < hearings.length - 1; h2++) {
        hearings[h2].nextDate = hearings[h2 + 1].date;
      }
      if (status !== "Disposed") {
        var lastH = hearings[hearings.length - 1];
        var nextD = new Date(lastH.date);
        nextD.setDate(nextD.getDate() + rand(14, 45));
        lastH.nextDate = nextD.toISOString().slice(0, 10);
      }
      cases.push({
        id: num,
        caseId: generateCaseId(zone.id, STATE_ABBR[state.name], AREA_ABBR[area.name], year, num),
        caseNumber: (caseType === "Civil" ? "CS" : caseType === "Criminal" ? "CR" : caseType === "Revenue" ? "RV" : caseType === "Writ Petition" ? "WP" : caseType === "Consumer" ? "CC" : "MC") + "-" + rand(100, 9999) + "/" + year,
        caseType: caseType,
        direction: direction,
        priority: priority,
        status: status,
        court: pick(COURTS),
        advocate: pick(ADVOCATES),
        opposingParty: pick(OPPOSING_PARTIES),
        centreId: centre.id,
        centreName: centre.name,
        areaId: area.id,
        areaName: area.name,
        stateId: state.id,
        stateName: state.name,
        zoneId: zone.id,
        zoneName: zone.name,
        filedDate: filedDate,
        nextHearingDate: status !== "Disposed" ? hearings[hearings.length - 1].nextDate : null,
        hearings: hearings,
        documents: rand(2, 8),
        checklistTotal: rand(6, 10),
        checklistDone: rand(2, 10),
        expenses: rand(5000, 200000),
      });
      num++;
    }
  });
  return cases;
})();

// ─── COLORS ──────────────────────────────────────────────────────
const TYPE_COLORS = { Civil: "#3b82f6", Criminal: "#ef4444", Revenue: "#f59e0b", "Writ Petition": "#8b5cf6", Consumer: "#10b981", Other: "#94a3b8" };
const STATUS_COLORS = { New: "#3b82f6", Active: "#16a34a", Adjourned: "#f59e0b", "Reserved for Order": "#8b5cf6", "Stayed / Injunction": "#ef4444", Disposed: "#94a3b8", Escalated: "#dc2626" };
const PRIORITY_COLORS = { Critical: "#ef4444", High: "#f59e0b", Normal: "#16a34a" };
const CAUSE_COLORS = { "Our side": "#ef4444", "Other party": "#3b82f6", Court: "#94a3b8", Either: "#f59e0b", Both: "#8b5cf6", Process: "#6b7280", Advocate: "#ea580c", Varies: "#6b7280" };

// ─── UTILITY COMPONENTS ─────────────────────────────────────────
function Pill({ color, children }) {
  var bg = { red: "#fee2e2", blue: "#dbeafe", green: "#dcfce7", amber: "#fef3c7", purple: "#ede9fe", grey: "#e2e8f0", orange: "#ffedd5" };
  var fg = { red: "#991b1b", blue: "#1e40af", green: "#166534", amber: "#92400e", purple: "#5b21b6", grey: "#475569", orange: "#9a3412" };
  return <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 999, fontSize: 11, fontWeight: 600, background: bg[color], color: fg[color] }}>{children}</span>;
}

function KpiCard({ label, value, sub, accent }) {
  return (
    <div style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: 10, padding: "14px 16px", borderLeft: accent ? "4px solid " + accent : undefined }}>
      <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#64748b", marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 24, fontWeight: 700, color: accent || "#7a1515" }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function SectionCard({ children, style }) {
  return <div style={Object.assign({ background: "white", border: "1px solid #e2e8f0", borderRadius: 10, padding: "18px 20px", marginBottom: 14, boxShadow: "0 1px 2px rgba(0,0,0,0.02)" }, style || {})}>{children}</div>;
}

function Select({ value, onChange, options, style, label }) {
  return (
    <label style={Object.assign({ fontSize: 12, color: "#64748b", display: "flex", alignItems: "center", gap: 6 }, style || {})}>
      {label && <span style={{ fontWeight: 600 }}>{label}</span>}
      <select value={value} onChange={function(e) { onChange(e.target.value); }} style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13, background: "white", color: "#1f2937" }}>
        {options.map(function(o) { return <option key={o.value} value={o.value}>{o.label}</option>; })}
      </select>
    </label>
  );
}

// ─── CSS CHART REPLACEMENTS (for Recharts) ──────────────────────
function CSSDonut({ data, size }) {
  var sz = size || 160;
  var total = data.reduce(function(s, d) { return s + d.value; }, 0) || 1;
  var cumPct = 0;
  var parts = [];
  data.forEach(function(d) {
    var pct = (d.value / total) * 100;
    parts.push(d.color + " " + cumPct + "% " + (cumPct + pct) + "%");
    cumPct += pct;
  });
  var gradient = "conic-gradient(" + parts.join(", ") + ")";
  return (
    <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
      <div style={{ width: sz, height: sz, borderRadius: "50%", background: gradient, position: "relative", flexShrink: 0 }}>
        <div style={{ position: "absolute", top: "22%", left: "22%", width: "56%", height: "56%", borderRadius: "50%", background: "white", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#1e293b" }}>{total}</div>
            <div style={{ fontSize: 9, color: "#94a3b8", textTransform: "uppercase" }}>Total</div>
          </div>
        </div>
      </div>
      <div style={{ fontSize: 11, lineHeight: 1.8 }}>
        {data.map(function(d, i) {
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 10, height: 10, borderRadius: 2, background: d.color, display: "inline-block", flexShrink: 0 }} />
              <span style={{ color: "#374151" }}>{d.name}</span>
              <span style={{ color: "#94a3b8", marginLeft: 4 }}>({d.value})</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CSSHBar({ data }) {
  var maxVal = Math.max.apply(null, data.map(function(d) { return d.count || d.value || 0; })) || 1;
  return (
    <div>
      {data.map(function(d, i) {
        var val = d.count || d.value || 0;
        var pct = (val / maxVal) * 100;
        return (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            <div style={{ width: 130, fontSize: 11, color: "#475569", textAlign: "right", flexShrink: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.name || d.label}</div>
            <div style={{ flex: 1, height: 16, background: "#f1f5f9", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ height: "100%", width: pct + "%", background: d.color || "#3b82f6", borderRadius: 4 }} />
            </div>
            <div style={{ width: 30, fontSize: 11, fontWeight: 600, color: "#1f2937" }}>{val}</div>
          </div>
        );
      })}
    </div>
  );
}

        <button onClick={function() { setShowBulkImport(!showBulkImport); if (!showBulkImport) setShowNewCaseForm(false); }} style={{ padding: "8px 16px", borderRadius: 8, border: showBulkImport ? "1px solid #e2e8f0" : "1px solid #3b82f6", background: showBulkImport ? "#e2e8f0" : "white", color: showBulkImport ? "#475569" : "#1e40af", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
          {showBulkImport ? "Cancel" : "Import from Excel"}
        </button>
      </div>

      {showBulkImport && <BulkImportPanel onClose={function() { setShowBulkImport(false); }} />}

      {/* Register New Case Form (Centre-level) */}
      {showNewCaseForm && (
        <SectionCard style={{ borderLeft: "4px solid #9b1c1c" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <h4 style={{ margin: 0, fontSize: 16, color: "#9b1c1c" }}>Register New Case</h4>
            <button onClick={function() { setShowNewCaseForm(false); }} style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #e2e8f0", background: "white", color: "#64748b", fontSize: 12, cursor: "pointer" }}>{"Cancel ✕"}</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Case Number *</label><input type="text" placeholder="e.g., CS-1234/2026" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Case Type *</label><select style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }}><option value="">Select type...</option>{CASE_TYPES.map(function(t) { return <option key={t} value={t}>{t}</option>; })}</select></div>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Direction *</label><select style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }}><option value="">Select...</option>{DIRECTIONS.map(function(d) { return <option key={d} value={d}>{d}</option>; })}</select></div>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Court Name *</label><input type="text" placeholder="e.g., Civil Court, Ludhiana" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Opposing Party *</label><input type="text" placeholder="Full name of opposing party" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Advocate Name</label><input type="text" placeholder="Name of advocate handling the case" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Priority *</label><select style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }}>{PRIORITIES.map(function(p) { return <option key={p} value={p}>{p}</option>; })}</select></div>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Filed Date *</label><input type="date" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
            <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>First Hearing Date</label><input type="date" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
            <div style={{ gridColumn: "1 / -1" }}><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Case Summary / Brief Description</label><textarea rows={2} placeholder="Brief description of the case..." style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13, fontFamily: "inherit", resize: "vertical" }} /></div>
          </div>
          <div style={{ marginTop: 16, padding: 14, background: "#f8fafc", borderRadius: 8, border: "1px solid #e2e8f0" }}>
            <h5 style={{ margin: "0 0 8px", fontSize: 13, color: "#1f2937" }}>Upload Initial Documents</h5>
            <p style={{ fontSize: 11, color: "#64748b", margin: "0 0 10px" }}>Upload relevant documents now. The full checklist will be auto-generated based on the case type selected above.</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div style={{ padding: "10px 12px", borderRadius: 6, border: "2px dashed #d1d5db", background: "white", textAlign: "center" }}>
                <div style={{ fontSize: 20, marginBottom: 4 }}>{"📄"}</div>
                <label style={{ fontSize: 12, color: "#9b1c1c", fontWeight: 600, cursor: "pointer" }}><input type="file" multiple style={{ display: "none" }} />Click to upload or drag files</label>
                <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 4 }}>PDF, JPG, PNG, DOCX (max 10MB each)</div>
              </div>
              <div style={{ fontSize: 12, color: "#64748b" }}>
                <div style={{ fontWeight: 600, marginBottom: 6 }}>Common initial uploads:</div>
                <div style={{ fontSize: 11, lineHeight: 1.8 }}>{"• Copy of plaint / FIR / petition"}<br/>{"• Title deed / ownership documents"}<br/>{"• Court notice / summons (if received)"}<br/>{"• Power of Attorney (Vakalatnama)"}<br/>{"• Photographs / site plan"}</div>
              </div>
            </div>
          </div>
          <div style={{ marginTop: 14, padding: 12, background: "#ede9fe", borderRadius: 8, border: "1px solid #c4b5fd" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <span style={{ fontSize: 14 }}>{"🔍"}</span>
              <h5 style={{ margin: 0, fontSize: 13, color: "#5b21b6" }}>Similar Cases Found</h5>
            </div>
            <p style={{ fontSize: 11, color: "#64748b", margin: "0 0 8px" }}>Based on the details entered, the system will show existing cases with matching opposing party, location, or court.</p>
            <div style={{ padding: "8px 10px", background: "white", borderRadius: 6, fontSize: 11, color: "#475569" }}>
              <em>{"Start filling in the case details above — matching cases will appear here automatically."}</em>
            </div>
          </div>
          <div style={{ marginTop: 14, display: "flex", gap: 8 }}>
            <button style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #9b1c1c, #7a1515)", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>{"Register Case & Generate Checklist"}</button>
            <button onClick={function() { setShowNewCaseForm(false); }} style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid #e2e8f0", background: "white", color: "#475569", fontSize: 13, cursor: "pointer" }}>Cancel</button>
          </div>
        </SectionCard>
      )}

      <HearingCalendar cases={centreCases} scopeLabel={centre && centre.name} onCaseClick={function(id) { setSelectedCaseId(id); }} />

      {/* Case List */}
      <SectionCard>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <h4 style={{ margin: 0, fontSize: 14 }}>Cases at {centre && centre.name}</h4>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, maxHeight: 400, overflowY: "auto" }}>
          {centreCases.map(function(c) {
            return (
              <div key={c.id} onClick={function() { setSelectedCaseId(c.id); }} style={{ padding: "10px 12px", borderRadius: 8, border: selectedCaseId === c.id ? "2px solid #9b1c1c" : "1px solid #e2e8f0", background: selectedCaseId === c.id ? "#fef2f2" : "white", cursor: "pointer", transition: "all 0.15s" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                  <span style={{ fontFamily: "monospace", fontSize: 11, fontWeight: 600 }}>{c.caseId}</span>
                  <Pill color={c.priority === "Critical" ? "red" : c.priority === "High" ? "amber" : "green"}>{c.priority}</Pill>
                </div>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{c.caseNumber}</div>
                <div style={{ fontSize: 11, color: "#64748b" }}>{c.caseType} {"·"} {c.direction} {"·"} <Pill color={c.status === "Active" ? "green" : c.status === "Adjourned" ? "amber" : c.status === "Disposed" ? "grey" : "blue"}>{c.status}</Pill></div>
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>vs {c.opposingParty} {"·"} {c.court}</div>
                {c.nextHearingDate && <div style={{ fontSize: 11, color: "#9b1c1c", marginTop: 4, fontWeight: 600 }}>Next Hearing: {c.nextHearingDate}</div>}
              </div>
            );
          })}
          {centreCases.length === 0 && <div style={{ padding: 20, textAlign: "center", color: "#94a3b8", gridColumn: "1 / -1" }}>No cases at this centre.</div>}
        </div>
      </SectionCard>

      {/* Case Detail + Hearing Timeline */}
      {activeCase && (
        <SectionCard>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 12, color: "#64748b", fontFamily: "monospace" }}>{activeCase.caseId}</div>
              <h4 style={{ margin: "4px 0 2px", fontSize: 16 }}>{activeCase.caseNumber} {"—"} {activeCase.caseType}</h4>
              <div style={{ fontSize: 13, color: "#475569" }}>{activeCase.direction} {"·"} {activeCase.court}</div>
              <div style={{ fontSize: 13, color: "#475569" }}>vs {activeCase.opposingParty} {"·"} Advocate: {activeCase.advocate}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <Pill color={activeCase.status === "Active" ? "green" : activeCase.status === "Adjourned" ? "amber" : activeCase.status === "Disposed" ? "grey" : "blue"}>{activeCase.status}</Pill>
              <div style={{ marginTop: 4 }}><Pill color={activeCase.priority === "Critical" ? "red" : activeCase.priority === "High" ? "amber" : "green"}>{activeCase.priority}</Pill></div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>Filed: {activeCase.filedDate}</div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 16 }}>
            <div style={{ padding: "8px 12px", background: "#f8fafc", borderRadius: 6, fontSize: 12 }}><div style={{ color: "#64748b" }}>Hearings</div><div style={{ fontWeight: 700, fontSize: 16 }}>{activeCase.hearings.length}</div></div>
            <div style={{ padding: "8px 12px", background: "#f8fafc", borderRadius: 6, fontSize: 12 }}><div style={{ color: "#64748b" }}>Documents</div><div style={{ fontWeight: 700, fontSize: 16 }}>{activeCase.documents}</div></div>
            <div style={{ padding: "8px 12px", background: "#f8fafc", borderRadius: 6, fontSize: 12 }}><div style={{ color: "#64748b" }}>Checklist</div><div style={{ fontWeight: 700, fontSize: 16 }}>{activeCase.checklistDone}/{activeCase.checklistTotal}</div></div>
            <div style={{ padding: "8px 12px", background: "#f8fafc", borderRadius: 6, fontSize: 12 }}><div style={{ color: "#64748b" }}>Expenses</div><div style={{ fontWeight: 700, fontSize: 16 }}>{"₹"}{(activeCase.expenses / 1000).toFixed(0)}K</div></div>
          </div>

          <h4 style={{ margin: "0 0 12px", fontSize: 14, borderBottom: "1px solid #e2e8f0", paddingBottom: 6 }}>Hearing Timeline</h4>
          <div style={{ maxHeight: 400, overflowY: "auto" }}>
            {[].concat(activeCase.hearings).reverse().map(function(h, i) {
              return (
                <div key={h.id} style={{ display: "grid", gridTemplateColumns: "90px 1fr", gap: 12, marginBottom: 0, padding: "10px 0", borderBottom: i < activeCase.hearings.length - 1 ? "1px solid #f1f5f9" : "none" }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#1f2937" }}>{h.date}</div>
                    <div style={{ fontSize: 10, color: "#94a3b8" }}>#{h.id}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 13, color: "#475569", marginBottom: 4 }}>{h.summary}</div>
                    {h.adjournmentReason && (
                      <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4, flexWrap: "wrap" }}>
                        <Pill color={h.adjournmentReason.cause === "Our side" ? "red" : h.adjournmentReason.cause === "Other party" ? "blue" : h.adjournmentReason.cause === "Court" ? "grey" : "amber"}>{h.adjournmentReason.label}</Pill>
                        <span style={{ fontSize: 10, color: "#94a3b8" }}>Cause: {h.adjournmentReason.cause}</span>
                      </div>
                    )}
                    {h.nextDate && <div style={{ fontSize: 11, color: "#9b1c1c" }}>Next date: {h.nextDate}</div>}
                    {h.actionItems && <div style={{ fontSize: 11, color: "#64748b", fontStyle: "italic", marginTop: 2 }}>Action: {h.actionItems}</div>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Action Buttons */}
          <div style={{ marginTop: 14, borderTop: "1px solid #e2e8f0", paddingTop: 14, display: "flex", gap: 8 }}>
            <button onClick={function() { setShowEntryForm(!showEntryForm); setShowDocUpload(false); }} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: showEntryForm ? "#e2e8f0" : "linear-gradient(135deg, #9b1c1c, #7a1515)", color: showEntryForm ? "#475569" : "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              {showEntryForm ? "Cancel Hearing" : "+ Log Hearing Outcome"}
            </button>
            <button onClick={function() { setShowDocUpload(!showDocUpload); setShowEntryForm(false); }} style={{ padding: "8px 16px", borderRadius: 8, border: showDocUpload ? "1px solid #e2e8f0" : "1px solid #9b1c1c", background: showDocUpload ? "#e2e8f0" : "white", color: showDocUpload ? "#475569" : "#9b1c1c", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              {showDocUpload ? "Cancel Upload" : "+ Upload Document"}
            </button>
          </div>

          {/* Hearing Entry Form */}
          {showEntryForm && (
            <div style={{ marginTop: 14, padding: 16, background: "#f8fafc", borderRadius: 10, border: "1px solid #e2e8f0" }}>
              <h4 style={{ margin: "0 0 12px", fontSize: 14, color: "#9b1c1c" }}>Log Hearing Outcome</h4>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Hearing Date *</label><input type="date" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
                <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Next Hearing Date</label><input type="date" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
                <div style={{ gridColumn: "1 / -1" }}><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Outcome Summary *</label><textarea rows={2} placeholder="What happened at the hearing..." style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13, fontFamily: "inherit", resize: "vertical" }} /></div>
                <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Adjournment Reason * <span style={{ color: "#ef4444" }}>(mandatory if next date set)</span></label><select style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }}><option value="">Select reason...</option>{ADJOURNMENT_REASONS.map(function(r) { return <option key={r.code} value={r.code}>{r.label} ({r.cause})</option>; })}</select></div>
                <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Updated Case Status</label><select style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }}>{STATUSES.map(function(s) { return <option key={s} value={s}>{s}</option>; })}</select></div>
                <div style={{ gridColumn: "1 / -1" }}><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Action Items Before Next Hearing</label><input type="text" placeholder="e.g., File reply, Submit evidence..." style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
                <div style={{ gridColumn: "1 / -1" }}><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Upload Court Order (optional)</label><input type="file" style={{ fontSize: 12 }} /></div>
              </div>
              <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                <button style={{ padding: "8px 20px", borderRadius: 8, border: "none", background: "#16a34a", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Save Hearing</button>
                <button onClick={function() { setShowEntryForm(false); }} style={{ padding: "8px 20px", borderRadius: 8, border: "1px solid #e2e8f0", background: "white", color: "#475569", fontSize: 13, cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          )}

          {/* Document Upload Panel */}
          {showDocUpload && (
            <div style={{ marginTop: 14, padding: 16, background: "#f8fafc", borderRadius: 10, border: "1px solid #e2e8f0" }}>
              <h4 style={{ margin: "0 0 12px", fontSize: 14, color: "#9b1c1c" }}>{"Upload Document — "}{activeCase.caseNumber}</h4>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Document Type *</label>
                  <select style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }}>
                    <option value="">Select type...</option>
                    <option value="plaint">Plaint / Petition / Application</option>
                    <option value="reply">Written Statement / Reply</option>
                    <option value="court_order">Court Order</option>
                    <option value="title_deed">Title Deed / Sale Deed</option>
                    <option value="revenue_record">Revenue Record (Jamabandi / Fard)</option>
                    <option value="fir">FIR / NCR Copy</option>
                    <option value="affidavit">Affidavit</option>
                    <option value="vakalatnama">Power of Attorney (Vakalatnama)</option>
                    <option value="evidence">Evidence (Photographs / Video)</option>
                    <option value="site_plan">Site Plan / Map</option>
                    <option value="correspondence">Correspondence / Notices</option>
                    <option value="witness">Witness Statement</option>
                    <option value="expense_receipt">Expense Receipt</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Link to Checklist Item (optional)</label>
                  <select style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }}>
                    <option value="">{"None — standalone upload"}</option>
                    <option value="1">Copy of plaint / written statement</option>
                    <option value="2">Title deed / sale deed</option>
                    <option value="3">Revenue record (Jamabandi)</option>
                    <option value="4">Power of Attorney (Vakalatnama)</option>
                    <option value="5">Court order</option>
                  </select>
                </div>
                <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Related Hearing Date (optional)</label>
                  <select style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }}>
                    <option value="">Not linked to a hearing</option>
                    {[].concat(activeCase.hearings).reverse().slice(0, 5).map(function(h) {
                      return <option key={h.id} value={h.id}>{"Hearing #" + h.id + " — " + h.date}</option>;
                    })}
                  </select>
                </div>
                <div><label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>Description / Notes</label><input type="text" placeholder="Brief note about this document..." style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 13 }} /></div>
                <div style={{ gridColumn: "1 / -1" }}>
                  <div style={{ padding: "16px", borderRadius: 8, border: "2px dashed #d1d5db", background: "white", textAlign: "center" }}>
                    <div style={{ fontSize: 24, marginBottom: 6 }}>{"📎"}</div>
                    <label style={{ fontSize: 13, color: "#9b1c1c", fontWeight: 600, cursor: "pointer" }}>
                      <input type="file" multiple style={{ display: "none" }} />
                      Click to select files or drag and drop here
                    </label>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4 }}>{"PDF, JPG, PNG, DOCX — max 10MB per file — multiple files allowed"}</div>
                  </div>
                </div>
              </div>

              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#1f2937", marginBottom: 8 }}>Uploaded Documents ({activeCase.documents})</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                  {["Plaint copy.pdf", "Title deed scan.pdf", "Site photographs.zip", "Vakalatnama.pdf", "Court notice dated 12-Mar.pdf"].slice(0, activeCase.documents > 5 ? 5 : activeCase.documents).map(function(doc, i) {
                    return (
                      <div key={i} style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", background: "white", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 11 }}>
                        <span>{"📄 "}{doc}</span>
                        <span style={{ color: "#94a3b8" }}>View</span>
                      </div>
                    );
                  })}
                  {activeCase.documents > 5 && <div style={{ padding: "6px 10px", fontSize: 11, color: "#64748b" }}>+{activeCase.documents - 5} more files</div>}
                </div>
              </div>

              <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                <button style={{ padding: "8px 20px", borderRadius: 8, border: "none", background: "#16a34a", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>{"Upload & Save"}</button>
                <button onClick={function() { setShowDocUpload(false); }} style={{ padding: "8px 20px", borderRadius: 8, border: "1px solid #e2e8f0", background: "white", color: "#475569", fontSize: 13, cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          )}
        </SectionCard>
      )}

      {/* Document Checklist */}
      {activeCase && (
        <SectionCard>
          <h4 style={{ margin: "0 0 12px", fontSize: 14 }}>{"Document Checklist — "}{activeCase.caseType}</h4>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {(activeCase.caseType === "Civil" ? ["Copy of plaint / written statement", "Title deed / sale deed", "Revenue record (Jamabandi)", "Site plan / map", "Photographs of property", "Previous court orders", "Affidavit of authorized signatory", "Power of Attorney (Vakalatnama)", "Correspondence with other party"] :
              activeCase.caseType === "Revenue" ? ["Mutation application copy", "Jamabandi / revenue records", "Sale deed / gift deed / will", "Identity proof of RSSB representative", "Previous mutation orders", "Tehsildar / SDM order", "Site inspection report", "Death certificate (if succession)"] :
              activeCase.caseType === "Criminal" ? ["Copy of FIR / NCR", "Complaint letter (original)", "Witness statements", "Photographs / video evidence", "Medical report (if relevant)", "Police investigation report", "Bail application (if applicable)", "ID proof of representative"] :
              activeCase.caseType === "Writ Petition" ? ["Government order being challenged", "Grounds for writ (legal brief)", "Relevant statutory provisions", "Affidavit in support", "Supporting documentary evidence", "Previous correspondence with authority", "Lower court order (if appeal)", "Memo of parties", "Court fee receipt"] :
              ["Application copy", "Supporting documents", "Evidence", "Identity proof", "Previous orders", "Correspondence"]
            ).map(function(doc, i) {
              var done = i < activeCase.checklistDone;
              return (
                <div key={i} style={{ padding: "8px 12px", borderRadius: 6, border: "1px solid #e2e8f0", background: done ? "#f0fdf4" : "#fff", display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
                  <span style={{ width: 18, height: 18, borderRadius: 4, border: done ? "none" : "2px solid #d1d5db", background: done ? "#16a34a" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 11, flexShrink: 0 }}>{done ? "✓" : ""}</span>
                  <span style={{ flex: 1, color: done ? "#166534" : "#475569" }}>{doc}</span>
                  {done
                    ? <span style={{ fontSize: 10, color: "#16a34a", flexShrink: 0 }}>{"📄 View"}</span>
                    : <button onClick={function() { setShowDocUpload(true); }} style={{ padding: "2px 8px", borderRadius: 4, border: "1px solid #d1d5db", background: "white", color: "#9b1c1c", fontSize: 10, fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>Upload</button>
                  }
                </div>
              );
            })}
          </div>
        </SectionCard>
      )}
    </div>
  );
}

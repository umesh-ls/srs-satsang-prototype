// ─── UTILITY COMPONENTS ─────────────────────────────────────────
function Pill({ color, children }) {
  const bg = { red:"#fee2e2", blue:"#dbeafe", green:"#dcfce7", amber:"#fef3c7", purple:"#ede9fe", grey:"#e2e8f0", orange:"#ffedd5", cyan:"#cffafe" };
  const fg = { red:"#991b1b", blue:"#1e40af", green:"#166534", amber:"#92400e", purple:"#5b21b6", grey:"#475569", orange:"#9a3412", cyan:"#155e75" };
  return <span style={{ display:"inline-block", padding:"2px 8px", borderRadius:999, fontSize:11, fontWeight:600, background:bg[color]||bg.grey, color:fg[color]||fg.grey }}>{children}</span>;
}

function KpiCard({ label, value, sub, accent, icon }) {
  return (
    <div style={{ background:"white", border:"1px solid #e2e8f0", borderRadius:10, padding:"14px 16px", borderLeft: accent ? "4px solid " + accent : undefined, flex:1, minWidth:140 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:1, color:"#64748b", marginBottom:4 }}>{label}</div>
          <div style={{ fontSize:24, fontWeight:700, color: accent||"#7a1515" }}>{value}</div>
          {sub && <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>{sub}</div>}
        </div>
        {icon && <div style={{ fontSize:28, opacity:0.2 }}>{icon}</div>}
      </div>
    </div>
  );
}

function SectionCard({ title, children, style, headerRight }) {
  return (
    <div style={{ background:"white", border:"1px solid #e2e8f0", borderRadius:10, padding:"18px 20px", marginBottom:14, boxShadow:"0 1px 2px rgba(0,0,0,0.02)", ...style }}>
      {title && (
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <h3 style={{ margin:0, fontSize:14, fontWeight:700, color:"#1e293b" }}>{title}</h3>
          {headerRight}
        </div>
      )}
      {children}
    </div>
  );
}

function Select({ value, onChange, options, style, label }) {
  return (
    <label style={{ fontSize:12, color:"#64748b", display:"flex", alignItems:"center", gap:6, ...style }}>
      {label && <span style={{ fontWeight:600 }}>{label}</span>}
      <select value={value} onChange={e=>onChange(e.target.value)} style={{ padding:"6px 10px", borderRadius:6, border:"1px solid #e2e8f0", fontSize:13, background:"white", color:"#1f2937" }}>
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </label>
  );
}

function ProgressBar({ pct, height }) {
  const h = height || 8;
  const color = pct >= 80 ? "#16a34a" : pct >= 50 ? "#f59e0b" : "#ef4444";
  return (
    <div style={{ background:"#e2e8f0", borderRadius:4, height:h, width:"100%", overflow:"hidden" }}>
      <div style={{ width: Math.min(pct,100) + "%", height:"100%", background:color, borderRadius:4, transition:"width 0.3s" }} />
    </div>
  );
}

function SimpleBar({ label, pct, color }) {
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:3 }}>
        <span style={{ color:"#374151", fontWeight:500 }}>{label}</span>
        <span style={{ color:"#64748b" }}>{pct}%</span>
      </div>
      <div style={{ background:"#e2e8f0", borderRadius:4, height:10, overflow:"hidden" }}>
        <div style={{ width: Math.min(pct,100) + "%", height:"100%", background:color||"#9b1c1c", borderRadius:4, transition:"width 0.3s" }} />
      </div>
    </div>
  );
}

function Btn({ children, onClick, variant, size, style: sx }) {
  const v = variant || "primary";
  const s = size || "sm";
  const base = { border:"none", borderRadius:6, cursor:"pointer", fontWeight:600, transition:"all 0.15s", display:"inline-flex", alignItems:"center", gap:4 };
  const sizes = { sm:{ padding:"6px 12px", fontSize:12 }, md:{ padding:"8px 16px", fontSize:13 } };
  const variants = {
    primary: { background:"#9b1c1c", color:"white" },
    secondary: { background:"#f1f5f9", color:"#475569", border:"1px solid #e2e8f0" },
    success: { background:"#16a34a", color:"white" },
    danger: { background:"#dc2626", color:"white" },
    amber: { background:"#f59e0b", color:"white" },
    ghost: { background:"transparent", color:"#64748b" },
  };
  return <button onClick={onClick} style={{ ...base, ...sizes[s], ...variants[v], ...sx }}>{children}</button>;
}

function FormField({ label, children, required }) {
  return (
    <div style={{ marginBottom:12 }}>
      <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#374151", marginBottom:4 }}>{label}{required && <span style={{color:"#dc2626"}}> *</span>}</label>
      {children}
    </div>
  );
}

const inputStyle = { width:"100%", padding:"8px 10px", borderRadius:6, border:"1px solid #d1d5db", fontSize:13, boxSizing:"border-box" };

// ─── KEBAB MENU ──────────────────────────────────────────────────
function KebabMenu({ onView, onExtension }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ position:"relative" }}>
      <button onClick={()=>setOpen(!open)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:18, padding:"4px 8px", color:"#64748b", lineHeight:1 }}>{"⋮"}</button>
      {open && (
        <Fragment>
          <div style={{ position:"fixed", inset:0, zIndex:50 }} onClick={()=>setOpen(false)} />
          <div style={{ position:"absolute", right:0, top:"100%", background:"white", border:"1px solid #e2e8f0", borderRadius:8, boxShadow:"0 4px 12px rgba(0,0,0,0.1)", zIndex:51, minWidth:200, overflow:"hidden" }}>
            <button onClick={()=>{ setOpen(false); if(onView) onView(); }} style={{ display:"block", width:"100%", textAlign:"left", padding:"9px 14px", border:"none", background:"white", fontSize:13, color:"#374151", cursor:"pointer" }}
              onMouseEnter={e=>e.target.style.background="#f8fafc"} onMouseLeave={e=>e.target.style.background="white"}>
              View Profile
            </button>
            <button onClick={()=>{ setOpen(false); if(onExtension) onExtension(); }} style={{ display:"block", width:"100%", textAlign:"left", padding:"9px 14px", border:"none", background:"white", fontSize:13, color:"#374151", cursor:"pointer" }}
              onMouseEnter={e=>e.target.style.background="#f8fafc"} onMouseLeave={e=>e.target.style.background="white"}>
              Apply for Extension
            </button>
            <div style={{ borderTop:"1px solid #e2e8f0", padding:"4px 14px 2px", fontSize:10, color:"#94a3b8", textTransform:"uppercase", letterSpacing:1 }}>Phase 2</div>
            <div style={{ display:"block", width:"100%", textAlign:"left", padding:"9px 14px", fontSize:13, color:"#cbd5e1", cursor:"default" }}>Change of Sewa</div>
            <div style={{ display:"block", width:"100%", textAlign:"left", padding:"9px 14px", fontSize:13, color:"#cbd5e1", cursor:"default" }}>Change Sewa Status</div>
          </div>
        </Fragment>
      )}
    </div>
  );
}

// ─── SIDE PANEL ──────────────────────────────────────────────────
function SidePanel({ func, onClose, onSaveEdits, role, onConsentAction, sessions }) {
  const [activeTab, setActiveTab] = useState("profile");
  const [editing, setEditing] = useState(false);
  const [editData, setEditData] = useState({});
  if (!func) return null;

  const startEdit = () => {
    setEditData({
      fatherName: func.fatherName, spouseName: func.spouseName || "",
      dob: func.dob, gender: func.gender, aadhaar: func.aadhaar,
      mobile1: func.mobile1, mobile2: func.mobile2 || "",
      email: func.email || "", qualification: func.qualification,
      profession: func.profession, language: func.language,
      disability: func.disability, address: func.address,
    });
    setEditing(true);
  };

  const handleFieldChange = (field, value) => { setEditData(prev => ({ ...prev, [field]: value })); };

  const handleSave = () => {
    const changes = [];
    const fieldLabels = { fatherName:"Father's Name", spouseName:"Spouse Name", dob:"Date of Birth", gender:"Gender", aadhaar:"Aadhaar", mobile1:"Mobile 1", mobile2:"Mobile 2", email:"Email", qualification:"Qualification", profession:"Profession", language:"Language", disability:"Disability", address:"Address" };
    Object.keys(editData).forEach(key => {
      const origVal = func[key] || "";
      if (editData[key] !== origVal) {
        changes.push({ field: fieldLabels[key] || key, oldValue: origVal || "—", newValue: editData[key] });
      }
    });
    if (changes.length > 0 && onSaveEdits) onSaveEdits(func.id, editData, changes);
    setEditing(false);
  };

  const tabs = [
    { id:"profile", label:"Profile" },
    { id:"sewa", label:"Sewa History" },
    { id:"changes", label:"Change Log (" + (func.changeLog ? func.changeLog.length : 0) + ")" },
  ];
  if (func.designation === "Satsang Karta") tabs.push({ id:"programme", label:"Programme" });

  const expiryColor = func.daysToExpiry && func.daysToExpiry <= 30 ? "#dc2626" : func.daysToExpiry && func.daysToExpiry <= 90 ? "#f59e0b" : "#16a34a";

  const editableFields = [
    { key:"fatherName", label:"Father's Name", type:"text" },
    { key:"spouseName", label:"Spouse Name", type:"text" },
    { key:"dob", label:"Date of Birth", type:"date" },
    { key:"gender", label:"Gender", type:"select", options:["Male","Female"] },
    { key:"aadhaar", label:"Aadhaar", type:"text" },
    { key:"mobile1", label:"Mobile 1", type:"text" },
    { key:"mobile2", label:"Mobile 2", type:"text" },
    { key:"email", label:"Email", type:"text" },
    { key:"qualification", label:"Qualification", type:"select", options: QUALIFICATIONS },
    { key:"profession", label:"Profession", type:"select", options: PROFESSIONS },
    { key:"language", label:"Language", type:"select", options: LANGUAGES },
    { key:"disability", label:"Disability", type:"text" },
  ];

  return (
    <div style={{ position:"fixed", right:0, top:0, width:"48%", maxWidth:640, height:"100vh", background:"white", boxShadow:"-4px 0 20px rgba(0,0,0,0.12)", zIndex:100, display:"flex", flexDirection:"column", borderLeft:"1px solid #e2e8f0" }}>
      <div style={{ background: editing ? "linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%)" : "linear-gradient(135deg, #9b1c1c 0%, #7a1515 100%)", color:"white", padding:"16px 20px", flexShrink:0, transition:"background 0.3s" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            {editing && <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:2, opacity:0.8, marginBottom:4, background:"rgba(255,255,255,0.15)", display:"inline-block", padding:"2px 8px", borderRadius:4 }}>Edit Mode {"—"} Data Correction</div>}
            <div style={{ fontSize:18, fontWeight:700 }}>{func.name}</div>
            <div style={{ fontSize:12, opacity:0.9, marginTop:2 }}>{func.designation} {"·"} {func.centreName}</div>
            <div style={{ fontSize:11, opacity:0.75, marginTop:2 }}>{func.personCode} {"·"} {func.areaName}, {func.stateName}</div>
          </div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"white", borderRadius:6, padding:"4px 10px", cursor:"pointer", fontSize:16 }}>{"×"}</button>
        </div>
        <div style={{ display:"flex", gap:8, marginTop:10 }}>
          <Pill color={PSTATUS_COLORS[func.presentStatus]}>{func.presentStatus}</Pill>
          {func.scmSyncBadge && <Pill color="cyan">SCM Updated</Pill>}
          {func.isExpiringSoon && <span style={{ background:expiryColor, color:"white", padding:"2px 8px", borderRadius:999, fontSize:11, fontWeight:600 }}>Expires in {func.daysToExpiry}d</span>}
        </div>
      </div>

      <div style={{ display:"flex", borderBottom:"1px solid #e2e8f0", flexShrink:0, alignItems:"center" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={()=>{ setActiveTab(t.id); if (t.id !== "profile") setEditing(false); }}
            style={{ padding:"10px 16px", border:"none", borderBottom: activeTab===t.id ? (editing?"2px solid #1e40af":"2px solid #9b1c1c") : "2px solid transparent", background: activeTab===t.id ? (editing?"#eff6ff":"#fef2f2") : "white", color: activeTab===t.id ? (editing?"#1e40af":"#9b1c1c") : "#64748b", fontSize:12, fontWeight: activeTab===t.id?700:500, cursor:"pointer" }}>
            {t.label}
          </button>
        ))}
        <div style={{ flex:1 }} />
        {activeTab === "profile" && !editing && (
          <Btn variant="primary" size="sm" onClick={startEdit} style={{ marginRight:12 }}>Edit Profile</Btn>
        )}
        {activeTab === "profile" && editing && (
          <div style={{ display:"flex", gap:6, marginRight:12 }}>
            <Btn variant="secondary" size="sm" onClick={()=>setEditing(false)}>Cancel</Btn>
            <Btn variant="success" size="sm" onClick={handleSave}>Save Changes</Btn>
          </div>
        )}
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"16px 20px" }}>
        {activeTab === "profile" && !editing && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {[
                ["Father's Name", func.fatherName],
                ["Spouse Name", func.spouseName || "—"],
                ["Date of Birth", func.dob],
                ["Age", func.age + " years"],
                ["Gender", func.gender],
                ["Aadhaar", func.aadhaar],
                ["Mobile 1", func.mobile1],
                ["Mobile 2", func.mobile2 || "—"],
                ["Email", func.email || "—"],
                ["Qualification", func.qualification],
                ["Profession", func.profession],
                ["Language", func.language],
                ["Disability", func.disability],
              ].map((pair,i) => (
                <div key={i} style={{ padding:"8px 0", borderBottom:"1px solid #f1f5f9" }}>
                  <div style={{ fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.5 }}>{pair[0]}</div>
                  <div style={{ fontSize:13, color:"#1e293b", fontWeight:500, marginTop:2 }}>{pair[1]}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop:14, padding:"10px 12px", background:"#f8fafc", borderRadius:8, border:"1px solid #e2e8f0" }}>
              <div style={{ fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.5, marginBottom:4 }}>Address</div>
              <div style={{ fontSize:13, color:"#1e293b" }}>{func.address}</div>
            </div>
          </div>
        )}

        {activeTab === "profile" && editing && (
          <div>
            <div style={{ padding:10, background:"#eff6ff", borderRadius:8, border:"1px solid #bfdbfe", marginBottom:16 }}>
              <div style={{ fontSize:12, color:"#1e40af" }}>Make corrections to the profile fields below. Changes will be tracked in the Change Log with before/after values.</div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {editableFields.map(f => {
                const val = editData[f.key] || "";
                const origVal = func[f.key] || "";
                const isChanged = val !== origVal;
                return (
                  <div key={f.key} style={{ marginBottom:4 }}>
                    <label style={{ display:"block", fontSize:11, fontWeight:600, color: isChanged?"#1e40af":"#374151", marginBottom:3 }}>
                      {f.label} {isChanged && <span style={{ color:"#f59e0b", fontSize:10 }}>(modified)</span>}
                    </label>
                    {f.type === "select" ? (
                      <select value={val} onChange={e=>handleFieldChange(f.key, e.target.value)}
                        style={{ ...inputStyle, borderColor: isChanged?"#3b82f6":"#d1d5db", background: isChanged?"#eff6ff":"white" }}>
                        <option value="">{"—"}</option>
                        {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                      </select>
                    ) : (
                      <input type={f.type} value={val} onChange={e=>handleFieldChange(f.key, e.target.value)}
                        style={{ ...inputStyle, borderColor: isChanged?"#3b82f6":"#d1d5db", background: isChanged?"#eff6ff":"white" }} />
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop:12 }}>
              <label style={{ display:"block", fontSize:11, fontWeight:600, color: editData.address !== func.address?"#1e40af":"#374151", marginBottom:3 }}>
                Address {editData.address !== func.address && <span style={{ color:"#f59e0b", fontSize:10 }}>(modified)</span>}
              </label>
              <textarea value={editData.address || ""} onChange={e=>handleFieldChange("address", e.target.value)}
                style={{ ...inputStyle, height:60, borderColor: editData.address !== func.address?"#3b82f6":"#d1d5db", background: editData.address !== func.address?"#eff6ff":"white" }} />
            </div>
          </div>
        )}

        {activeTab === "sewa" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
              {[
                ["Sewadar Type", func.sewadarType],
                ["Appointment Type", func.appointmentType],
                ["Letter No.", func.appointmentLetterNo || "—"],
                ["Sewa Start", func.sewaStartDate],
                ["Approval Period", func.appointmentStartDate + " to " + func.appointmentEndDate],
                ["Total Sewa Years", func.totalSewaYears + " years"],
              ].map((pair,i) => (
                <div key={i} style={{ padding:"8px 0", borderBottom:"1px solid #f1f5f9" }}>
                  <div style={{ fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.5 }}>{pair[0]}</div>
                  <div style={{ fontSize:13, color:"#1e293b", fontWeight:500, marginTop:2 }}>{pair[1]}</div>
                </div>
              ))}
            </div>
            {func.isExpiringSoon && (
              <div style={{ padding:12, background:"#fef2f2", borderRadius:8, border:"1px solid #fecaca", marginTop:8 }}>
                <div style={{ fontSize:13, fontWeight:600, color:"#991b1b" }}>{"⚠"} Approval Expiring</div>
                <div style={{ fontSize:12, color:"#7f1d1d", marginTop:4 }}>Approval period ends on {func.appointmentEndDate}. Extension request should be initiated.</div>
              </div>
            )}
            <SectionCard title="Sewa History" style={{ marginTop:16 }}>
              <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
                <thead><tr style={{ background:"#f8fafc" }}>
                  {["Centre","Area","Designation","Type","From","To","Period"].map(h => <th key={h} style={{ padding:"8px 6px", textAlign:"left", fontWeight:600, color:"#475569", borderBottom:"1px solid #e2e8f0" }}>{h}</th>)}
                </tr></thead>
                <tbody><tr>
                  <td style={{ padding:"8px 6px", borderBottom:"1px solid #f1f5f9" }}>{func.centreName}</td>
                  <td style={{ padding:"8px 6px", borderBottom:"1px solid #f1f5f9" }}>{func.areaName}</td>
                  <td style={{ padding:"8px 6px", borderBottom:"1px solid #f1f5f9" }}>{func.designation}</td>
                  <td style={{ padding:"8px 6px", borderBottom:"1px solid #f1f5f9" }}>{func.appointmentType}</td>
                  <td style={{ padding:"8px 6px", borderBottom:"1px solid #f1f5f9" }}>{func.appointmentStartDate}</td>
                  <td style={{ padding:"8px 6px", borderBottom:"1px solid #f1f5f9" }}>{func.appointmentEndDate}</td>
                  <td style={{ padding:"8px 6px", borderBottom:"1px solid #f1f5f9" }}>{func.totalSewaYears}y</td>
                </tr></tbody>
              </table>
            </SectionCard>
          </div>
        )}

        {activeTab === "changes" && (
          <div>
            {func.changeLog && func.changeLog.length > 0 ? func.changeLog.map((cl,i) => (
              <div key={i} style={{ padding:12, background: i%2===0?"#f8fafc":"white", borderRadius:8, marginBottom:8, border:"1px solid #e2e8f0" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:"#1e293b" }}>{cl.field}</span>
                  <span style={{ fontSize:11, color:"#94a3b8" }}>{cl.changedAt}</span>
                </div>
                <div style={{ display:"flex", gap:8, fontSize:12 }}>
                  <span style={{ color:"#dc2626", textDecoration:"line-through" }}>{cl.oldValue}</span>
                  <span style={{ color:"#94a3b8" }}>{"→"}</span>
                  <span style={{ color:"#16a34a", fontWeight:500 }}>{cl.newValue}</span>
                </div>
                <div style={{ fontSize:11, color:"#94a3b8", marginTop:4 }}>Source: {cl.changeSource} {"·"} By: {cl.changedBy} {"·"} <Pill color={cl.approvalStatus==="Approved"?"green":"amber"}>{cl.approvalStatus}</Pill></div>
              </div>
            )) : (
              <div style={{ textAlign:"center", padding:32, color:"#94a3b8", fontSize:13 }}>No changes recorded for this functionary.</div>
            )}
          </div>
        )}

        {activeTab === "programme" && (
          <div>
            {func.guidanceProgrammeAttended === "Y" ? (
              <SectionCard title="Last Programme Attended">
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  <div><div style={{ fontSize:11, color:"#94a3b8" }}>Date</div><div style={{ fontSize:13, fontWeight:500 }}>{func.programmeDates}</div></div>
                  <div><div style={{ fontSize:11, color:"#94a3b8" }}>Location</div><div style={{ fontSize:13, fontWeight:500 }}>{func.programmeLocation}</div></div>
                </div>
              </SectionCard>
            ) : (
              <div style={{ padding:12, background:"#fef3c7", borderRadius:8, border:"1px solid #fde68a", marginBottom:12 }}>
                <div style={{ fontSize:12, color:"#92400e" }}>No guidance programme attended yet.</div>
              </div>
            )}
            <SectionCard title="SK Guidance Programme Consent">
              {func.consentSession ? (
                <div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
                    <div><div style={{ fontSize:11, color:"#94a3b8" }}>Session</div><div style={{ fontSize:13, fontWeight:500 }}>{((sessions||PROGRAMME_SESSIONS).find(s=>s.id===func.consentSession) || {}).label || func.consentSession}</div></div>
                    <div><div style={{ fontSize:11, color:"#94a3b8" }}>Consent Status</div><div style={{ fontSize:13, fontWeight:500 }}><Pill color={func.consentStatus==="Consented"?"green": func.consentStatus==="Not Interested"?"red":"amber"}>{func.consentStatus}</Pill></div></div>
                    {func.consentApproval && <div><div style={{ fontSize:11, color:"#94a3b8" }}>Approval Stage</div><div style={{ fontSize:13, fontWeight:500 }}><Pill color={func.consentApproval==="SCI Approved"?"green":"blue"}>{func.consentApproval}</Pill></div></div>}
                  </div>
                  {role === "sp" && (!func.consentApproval || func.consentApproval === "SP Recommended") && (
                    <div style={{ padding:12, background:"#f0fdf4", borderRadius:8, border:"1px solid #bbf7d0" }}>
                      <div style={{ fontSize:12, color:"#166534", marginBottom:10 }}>Select a session and mark consent. Only open sessions are available.</div>
                      <div style={{ marginBottom:10 }}>
                        <label style={{ display:"block", fontSize:11, fontWeight:600, color:"#166534", marginBottom:4 }}>Change Session</label>
                        <select style={{ ...inputStyle, borderColor:"#86efac", background:"#f0fdf4" }}
                          value={func.consentSession}
                          onChange={e => onConsentAction && onConsentAction(func.id, func.consentStatus || "Pending", null, e.target.value)}>
                          {(sessions||PROGRAMME_SESSIONS).filter(s => s.status === "Open").map(s => (
                            <option key={s.id} value={s.id}>{s.label} ({s.dates})</option>
                          ))}
                        </select>
                      </div>
                      <div style={{ display:"flex", gap:8 }}>
                        <Btn variant="success" size="sm" onClick={()=>onConsentAction && onConsentAction(func.id, "Consented")}>
                          {func.consentStatus === "Consented" ? "✓ Consented" : "Mark Consent"}
                        </Btn>
                        <Btn variant="secondary" size="sm" onClick={()=>onConsentAction && onConsentAction(func.id, "Not Interested")}>
                          {func.consentStatus === "Not Interested" ? "✓ Not Interested" : "Not Interested"}
                        </Btn>
                      </div>
                    </div>
                  )}
                  {role === "area" && func.consentApproval === "SP Recommended" && (
                    <div style={{ padding:12, background:"#eff6ff", borderRadius:8, border:"1px solid #bfdbfe" }}>
                      <div style={{ fontSize:12, color:"#1e40af", marginBottom:10 }}>This consent has been submitted by the Satsang Place. Review and approve or return.</div>
                      <div style={{ display:"flex", gap:8 }}>
                        <Btn variant="success" size="sm" onClick={()=>onConsentAction && onConsentAction(func.id, "Consented", "Area Approved")}>Approve</Btn>
                        <Btn variant="secondary" size="sm" onClick={()=>onConsentAction && onConsentAction(func.id, "Returned", "Returned by Area")}>Return</Btn>
                      </div>
                    </div>
                  )}
                  {(role === "state" || role === "zone") && func.consentApproval && (
                    <div style={{ padding:10, background:"#f8fafc", borderRadius:8, border:"1px solid #e2e8f0", fontSize:12, color:"#64748b" }}>
                      Approval pipeline: SP Recommended {"→"} Area Approved {"→"} State Approved {"→"} Zone Approved {"→"} SCI Approved
                    </div>
                  )}
                </div>
              ) : (
                <div>
                  <div style={{ fontSize:12, color:"#94a3b8", marginBottom:12 }}>No session selected yet for this SK.</div>
                  {role === "sp" && (
                    <div style={{ padding:12, background:"#f0fdf4", borderRadius:8, border:"1px solid #bbf7d0" }}>
                      <div style={{ fontSize:12, color:"#166534", marginBottom:10 }}>Select an open session for this SK and mark consent.</div>
                      {(sessions||PROGRAMME_SESSIONS).filter(s => s.status === "Open").length > 0 ? (
                        <div>
                          <div style={{ marginBottom:10 }}>
                            <label style={{ display:"block", fontSize:11, fontWeight:600, color:"#166534", marginBottom:4 }}>Select Session</label>
                            <select id={"session-select-" + func.id} style={{ ...inputStyle, borderColor:"#86efac", background:"#f0fdf4" }}>
                              <option value="">{"—"} Choose a Session {"—"}</option>
                              {(sessions||PROGRAMME_SESSIONS).filter(s => s.status === "Open").map(s => (
                                <option key={s.id} value={s.id}>{s.label} ({s.dates})</option>
                              ))}
                            </select>
                          </div>
                          <div style={{ display:"flex", gap:8 }}>
                            <Btn variant="success" size="sm" onClick={()=>{
                              var sel = document.getElementById("session-select-" + func.id);
                              if (sel && sel.value) onConsentAction && onConsentAction(func.id, "Consented", null, sel.value);
                            }}>Mark Consent</Btn>
                            <Btn variant="secondary" size="sm" onClick={()=>{
                              var sel = document.getElementById("session-select-" + func.id);
                              if (sel && sel.value) onConsentAction && onConsentAction(func.id, "Not Interested", null, sel.value);
                            }}>Not Interested</Btn>
                          </div>
                        </div>
                      ) : (
                        <div style={{ fontSize:12, color:"#92400e" }}>No open sessions available. Sessions are managed by the Zonal Office.</div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </SectionCard>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ACTION MODALS ───────────────────────────────────────────────
function Modal({ title, onClose, children, width }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"white", borderRadius:12, width: width||480, maxHeight:"85vh", overflow:"auto", boxShadow:"0 20px 60px rgba(0,0,0,0.15)" }}>
        <div style={{ padding:"16px 20px", borderBottom:"1px solid #e2e8f0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <h3 style={{ margin:0, fontSize:16, fontWeight:700, color:"#1e293b" }}>{title}</h3>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#94a3b8" }}>{"×"}</button>
        </div>
        <div style={{ padding:"16px 20px" }}>{children}</div>
      </div>
    </div>
  );
}

function ExtensionModal({ func, onClose }) {
  const [extStatus, setExtStatus] = useState(func.extensionStatus || "");
  return (
    <Modal title="Apply for Extension" onClose={onClose} width={520}>
      <div style={{ padding:10, background:"#f8fafc", borderRadius:8, marginBottom:16 }}>
        <div style={{ fontSize:13, fontWeight:600 }}>{func.name}</div>
        <div style={{ fontSize:12, color:"#64748b" }}>{func.personCode} {"·"} {func.designation} at {func.centreName}</div>
        <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>Current approval: {func.appointmentStartDate} to {func.appointmentEndDate}</div>
        {func.daysToExpiry && <div style={{ fontSize:12, color: func.daysToExpiry<=30?"#dc2626":"#f59e0b", fontWeight:600, marginTop:4 }}>Expires in {func.daysToExpiry} days</div>}
      </div>
      <FormField label="Extension Status" required>
        <select style={inputStyle} value={extStatus} onChange={e=>setExtStatus(e.target.value)}>
          <option value="">{"—"} Select Status {"—"}</option>
          <option value="Extension Applied">Extension Applied {"—"} Request sent via email / SCI form</option>
          <option value="Not To Be Applied">Not To Be Applied {"—"} Decision not to extend</option>
        </select>
      </FormField>
      {extStatus === "Extension Applied" && (
        <Fragment>
          <div style={{ padding:10, background:"#eff6ff", borderRadius:8, border:"1px solid #bfdbfe", marginBottom:12, fontSize:12, color:"#1e40af" }}>
            The extension request is processed via email and SCI forms. Once approved by SCI, the SCM data will be updated.
          </div>
          <FormField label="Date of Application"><input type="date" style={inputStyle}/></FormField>
          <FormField label="SCI Form Reference"><input style={inputStyle} placeholder="e.g. SCI-02/EXT/2026/..."/></FormField>
          <FormField label="Remarks"><textarea style={{...inputStyle, height:50}} placeholder="Any additional notes..."/></FormField>
        </Fragment>
      )}
      {extStatus === "Not To Be Applied" && (
        <Fragment>
          <FormField label="Reason" required>
            <select style={inputStyle}>
              <option>{"—"} Select Reason {"—"}</option>

// ─── CSS DONUT CHART ─────────────────────────────────────────────
function DonutChart({ data, size }) {
  const sz = size || 180;
  const total = data.reduce((s,d) => s + d.value, 0) || 1;
  let cumPct = 0;
  const gradientParts = [];
  data.forEach(d => {
    const pct = (d.value / total) * 100;
    gradientParts.push(d.color + " " + cumPct + "% " + (cumPct + pct) + "%");
    cumPct += pct;
  });
  const gradient = "conic-gradient(" + gradientParts.join(", ") + ")";
  return (
    <div style={{ display:"flex", gap:16, alignItems:"center" }}>
      <div style={{ width:sz, height:sz, borderRadius:"50%", background:gradient, position:"relative", flexShrink:0 }}>
        <div style={{ position:"absolute", top:"20%", left:"20%", width:"60%", height:"60%", borderRadius:"50%", background:"white", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:20, fontWeight:700, color:"#1e293b" }}>{total}</div>
            <div style={{ fontSize:9, color:"#94a3b8", textTransform:"uppercase" }}>Total</div>
          </div>
        </div>
      </div>
      <div style={{ fontSize:11, lineHeight:1.8 }}>
        {data.map((d,i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ width:10, height:10, borderRadius:2, background:d.color, display:"inline-block", flexShrink:0 }} />
            <span style={{ color:"#374151" }}>{d.label}</span>
            <span style={{ color:"#94a3b8", marginLeft:4 }}>({d.value})</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ListingView({ role, functionaries, setFunctionaries, sessions, selectedState, selectedArea, selectedSP }) {
  const [search, setSearch] = useState("");
  const [desigFilter, setDesigFilter] = useState("All");
  const [statusFilter, setStatusFilter] = useState("All");
  const [panelFunc, setPanelFunc] = useState(null);
  const [modal, setModal] = useState(null);
  const [saveMsg, setSaveMsg] = useState("");

  const handleSaveEdits = (funcId, eData, changes) => {
    setFunctionaries(prev => prev.map(f => {
      if (f.id !== funcId) return f;
      const newLog = changes.map((ch, i) => ({
        changeId: "CL-" + funcId + "-MAN-" + Date.now() + "-" + i,
        field: ch.field, oldValue: ch.oldValue, newValue: ch.newValue,
        changedBy: "Manual Correction", changedAt: new Date().toISOString().slice(0,16).replace("T"," "),
        changeSource: "Data Correction", approvalStatus: "Approved",
      }));
      return { ...f, ...eData, changeLog: [...(f.changeLog||[]), ...newLog] };
    }));
    setPanelFunc(prev => {
      if (!prev || prev.id !== funcId) return prev;
      const newLog = changes.map((ch, i) => ({
        changeId: "CL-" + funcId + "-MAN-" + Date.now() + "-" + i,
        field: ch.field, oldValue: ch.oldValue, newValue: ch.newValue,
        changedBy: "Manual Correction", changedAt: new Date().toISOString().slice(0,16).replace("T"," "),
        changeSource: "Data Correction", approvalStatus: "Approved",
      }));
      return { ...prev, ...eData, changeLog: [...(prev.changeLog||[]), ...newLog] };
    });
    setSaveMsg(changes.length + " field(s) updated");
    setTimeout(() => setSaveMsg(""), 3000);
  };

  const filtered = useMemo(() => {
    let f = functionaries;
    if (role === "state" && selectedState) f = f.filter(fn => fn.stateId === selectedState);
    if (role === "area" && selectedArea) f = f.filter(fn => fn.areaId === selectedArea);
    if (role === "sp" && selectedSP) f = f.filter(fn => fn.centreId === selectedSP);
    if (desigFilter !== "All") f = f.filter(fn => fn.designation === desigFilter);
    if (statusFilter !== "All") f = f.filter(fn => fn.presentStatus === statusFilter);
    if (search) { const s = search.toLowerCase(); f = f.filter(fn => fn.name.toLowerCase().includes(s) || fn.personCode.toLowerCase().includes(s) || fn.centreName.toLowerCase().includes(s)); }
    return f;
  }, [role, functionaries, selectedState, selectedArea, selectedSP, desigFilter, statusFilter, search]);

    <div>
      <SectionCard>
        <div style={{ display:"flex", gap:12, flexWrap:"wrap", alignItems:"center" }}>

          <Select label="Status:" value={statusFilter} onChange={setStatusFilter} options={[{value:"All",label:"All Statuses"}].concat(PRESENT_STATUSES.map(s=>({value:s,label:s})))} />
          <div style={{ flex:1 }} />
          <div style={{ fontSize:12, color:"#94a3b8" }}>{filtered.length} records</div>
        </div>
      </SectionCard>

      <SectionCard style={{ padding:0, overflow:"hidden" }}>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
            <thead><tr style={{ background:"#f8fafc" }}>
              {["Sr.", "Name"].concat(role !== "sp" ? ["State","Area"] : []).concat(["Centre", "Designation", "Person Code", "Age", "Sewa Status", ""]).map(h =>
                <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:600, color:"#475569", borderBottom:"2px solid #e2e8f0", whiteSpace:"nowrap" }}>{h}</th>
              )}
            </tr></thead>

              {filtered.slice(0,50).map((f, idx) => (

      </SectionCard>

      {saveMsg && (
        <div style={{ position:"fixed", bottom:24, right:24, background:"#16a34a", color:"white", padding:"12px 20px", borderRadius:10, boxShadow:"0 4px 12px rgba(0,0,0,0.15)", fontSize:13, fontWeight:600, zIndex:300, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>{"✓"}</span> {saveMsg}
        </div>
      )}

      {panelFunc && <SidePanel func={panelFunc} onClose={()=>setPanelFunc(null)} onSaveEdits={handleSaveEdits} role={role} sessions={sessions}
        onConsentAction={(funcId, consentStatus, approvalStage, sessionId) => {
          const updates = { consentStatus: consentStatus };
          if (approvalStage) updates.consentApproval = approvalStage;
          else if (consentStatus === "Consented") updates.consentApproval = "SP Recommended";
          else if (consentStatus === "Not Interested") updates.consentApproval = "";
          if (sessionId) {
            updates.consentSession = sessionId;
          } else if (!(functionaries.find(f=>f.id===funcId) || {}).consentSession) {
            updates.consentSession = ((sessions||PROGRAMME_SESSIONS).find(s=>s.status==="Open") || (sessions||PROGRAMME_SESSIONS)[0] || {}).id;
          }
          setFunctionaries(prev => prev.map(f => f.id===funcId ? { ...f, ...updates } : f));
          setPanelFunc(prev => prev && prev.id===funcId ? { ...prev, ...updates } : prev);
        }}
      />}

      {modal && modal.type === "ext" && <ExtensionModal func={modal.func} onClose={()=>setModal(null)} />}
    </div>
  );
}

// ─── SK GUIDANCE PROGRAMME ───────────────────────────────────────
function GuidanceProgramme({ role, functionaries, sessions, setSessions, selectedState, selectedArea, selectedSP }) {
  const [selectedSession, setSelectedSession] = useState(sessions[0] ? sessions[0].id : "");
  const session = sessions.find(s => s.id === selectedSession);
  const [showManageSessions, setShowManageSessions] = useState(false);
  const [newSession, setNewSession] = useState({ label: "", startDate: "", endDate: "" });

  const sks = useMemo(() => {
    let f = functionaries.filter(fn => fn.designation === "Satsang Karta");
    if (role === "state" && selectedState) f = f.filter(fn => fn.stateId === selectedState);
    if (role === "area" && selectedArea) f = f.filter(fn => fn.areaId === selectedArea);
    if (role === "sp" && selectedSP) f = f.filter(fn => fn.centreId === selectedSP);
    return f;
  }, [role, functionaries, selectedState, selectedArea, selectedSP]);

  const consented = sks.filter(s => s.consentSession === selectedSession && s.consentStatus === "Consented");
  const pending = sks.filter(s => s.consentSession === selectedSession && (s.consentStatus === "Pending" || s.consentStatus === "Not Yet"));
  const notContacted = sks.filter(s => !s.consentSession || s.consentSession !== selectedSession);
  const approvalStages = ["SP Recommended", "Area Approved", "State Approved", "Zone Approved", "SCI Approved"];
  const pipelineCounts = approvalStages.map(stage => consented.filter(s => s.consentApproval === stage).length);

  const formatDate = (d) => {
    if (!d) return "";
    const dt = new Date(d);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return dt.getDate() + " " + months[dt.getMonth()] + " " + dt.getFullYear();
  };

  const getSessionRegistrations = (sessionId) => {
    return functionaries.filter(f => f.designation === "Satsang Karta" && f.consentSession === sessionId && (f.consentStatus === "Consented" || f.consentStatus === "Pending" || f.consentStatus === "Not Yet")).length;
  };

  const handleAddSession = () => {
    if (!newSession.label || !newSession.startDate || !newSession.endDate) return;
    const id = newSession.label.replace(/[^a-zA-Z0-9]/g, "").slice(0,12).toUpperCase() + "-" + Date.now().toString().slice(-4);
    const dates = formatDate(newSession.startDate) + " – " + formatDate(newSession.endDate);
    setSessions(prev => [...prev, { id: id, label: newSession.label, dates: dates, status: "Open" }]);
    setNewSession({ label: "", startDate: "", endDate: "" });
  };

  const handleStatusChange = (sessionId, newStatus) => {
    setSessions(prev => prev.map(s => s.id === sessionId ? { ...s, status: newStatus } : s));
  };

  const handleDeleteSession = (sessionId) => {
    setSessions(prev => prev.filter(s => s.id !== sessionId));
    if (selectedSession === sessionId && sessions.length > 1) {
      setSelectedSession((sessions.find(s => s.id !== sessionId) || {}).id || "");
    }
  };

  return (
    <div>
      <SectionCard>
        <div style={{ display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
          <Select label="Select Session:" value={selectedSession} onChange={setSelectedSession}
            options={sessions.map(s => ({ value: s.id, label: s.label + " (" + s.dates + ")" }))} />
          <Pill color={session && session.status==="Open"?"green":"grey"}>{session ? session.status : ""}</Pill>
          <div style={{ flex:1 }} />
          <div style={{ fontSize:12, color:"#94a3b8" }}>{sks.length} Satsang Kartas in scope</div>
          {role === "zone" && <Btn variant="primary" size="sm" onClick={()=>setShowManageSessions(true)}>Manage Sessions</Btn>}
        </div>
      </SectionCard>

      <div style={{ display:"flex", gap:12, marginBottom:14, flexWrap:"wrap" }}>
        <KpiCard label="Consented" value={consented.length} accent="#16a34a" />
        <KpiCard label="Pending Response" value={pending.length} accent="#f59e0b" />
        <KpiCard label="Not Contacted" value={notContacted.length} accent="#94a3b8" />
        <KpiCard label="Consent Rate" value={(sks.length > 0 ? Math.round(consented.length/sks.length*100) : 0) + "%"} accent="#3b82f6" />
      </div>

      {role !== "sp" && (
        <SectionCard title="Approval Pipeline">
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            {approvalStages.map((stage, i) => (
              <Fragment key={stage}>
                <div style={{ flex:1, textAlign:"center", padding:"10px 4px", background: pipelineCounts[i] > 0 ? "#dcfce7" : "#f8fafc", borderRadius:8, border:"1px solid #e2e8f0" }}>
                  <div style={{ fontSize:18, fontWeight:700, color: pipelineCounts[i] > 0 ? "#16a34a" : "#94a3b8" }}>{pipelineCounts[i]}</div>
                  <div style={{ fontSize:10, color:"#64748b", marginTop:2 }}>{stage}</div>
                </div>
                {i < approvalStages.length - 1 && <span style={{ color:"#d1d5db", fontSize:16 }}>{"→"}</span>}
              </Fragment>
            ))}
          </div>
        </SectionCard>
      )}

      <SectionCard title="Satsang Kartas" style={{ padding:0, overflow:"hidden" }}>
        <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
          <thead><tr style={{ background:"#f8fafc" }}>
            {["Sr.","Name","Centre"].concat(role!=="sp"?["Area","State"]:[]).concat(["Programme Attended","Consent","Approval Stage"]).map(h =>
              <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:600, color:"#475569", borderBottom:"2px solid #e2e8f0", whiteSpace:"nowrap" }}>{h}</th>
            )}
          </tr></thead>
          <tbody>
            {sks.slice(0,40).map((sk, idx) => {
              const thisConsent = sk.consentSession === selectedSession ? sk.consentStatus : "—";
              const thisApproval = sk.consentSession === selectedSession ? (sk.consentApproval || "—") : "—";
              return (
                <tr key={sk.id} style={{ background: idx%2===0?"white":"#fafbfc" }}>
                  <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", color:"#94a3b8" }}>{idx+1}</td>
                  <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontWeight:500 }}>{sk.name}</td>
                  <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{sk.centreName}</td>
                  {role !== "sp" && <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{sk.areaName}</td>}
                  {role !== "sp" && <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{sk.stateName}</td>}
                  <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color={sk.guidanceProgrammeAttended==="Y"?"green":"grey"}>{sk.guidanceProgrammeAttended==="Y"?"Yes":"No"}</Pill></td>
                  <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color={thisConsent==="Consented"?"green": thisConsent==="Pending"?"amber":"grey"}>{thisConsent}</Pill></td>
                  <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontSize:11, color:"#64748b" }}>{thisApproval}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </SectionCard>

      {showManageSessions && (
        <Modal title="Manage Programme Sessions" onClose={()=>setShowManageSessions(false)} width={750}>
          <div style={{ padding:10, background:"#eff6ff", borderRadius:8, border:"1px solid #bfdbfe", marginBottom:16, fontSize:12, color:"#1e40af" }}>
            Add sessions as informed by Beas / SCI Office. <strong>Open</strong> sessions are available for SKs to register. <strong>Close</strong> sessions are hidden from registration. Only open sessions with zero registrations, and closed sessions, can be removed.
          </div>
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#1e293b", marginBottom:10 }}>Current Sessions</div>
            <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
              <thead><tr style={{ background:"#f8fafc" }}>
                {["Session","Period","Status","Registrations","Actions"].map(h =>
                  <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:600, color:"#475569", borderBottom:"2px solid #e2e8f0" }}>{h}</th>
                )}
              </tr></thead>
              <tbody>
                {sessions.map((s, idx) => {
                  const regCount = getSessionRegistrations(s.id);
                  const canRemove = (s.status === "Open" && regCount === 0) || s.status === "Close";
                  return (
                    <tr key={s.id} style={{ background: idx%2===0?"white":"#fafbfc" }}>
                      <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontWeight:500 }}>{s.label}</td>
                      <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontSize:11, color:"#64748b" }}>{s.dates}</td>
                      <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color={s.status==="Open"?"green":"grey"}>{s.status}</Pill></td>
                      <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>
                        <span style={{ fontWeight:600, color: regCount > 0 ? "#1e40af" : "#94a3b8" }}>{regCount}</span>
                        <span style={{ fontSize:10, color:"#94a3b8", marginLeft:4 }}>SK(s)</span>
                      </td>
                      <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>
                        <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                          {s.status === "Open" && <Btn variant="secondary" size="sm" onClick={()=>handleStatusChange(s.id, "Close")}>Close</Btn>}
                          {s.status === "Close" && <Btn variant="success" size="sm" onClick={()=>handleStatusChange(s.id, "Open")}>Re-Open</Btn>}
                          {canRemove ? (
                            <Btn variant="danger" size="sm" onClick={()=>handleDeleteSession(s.id)}>Remove</Btn>
                          ) : (
                            <span style={{ fontSize:10, color:"#f59e0b", alignSelf:"center", fontStyle:"italic" }}>{regCount} registration(s) {"—"} cannot remove</span>
                          )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
                {sessions.length === 0 && <tr><td colSpan={5} style={{ padding:24, textAlign:"center", color:"#94a3b8" }}>No sessions configured. Add one below.</td></tr>}
              </tbody>
            </table>
          </div>
          <div style={{ background:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:10, padding:16 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#166534", marginBottom:12 }}>Add New Session</div>
            <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr", gap:12, marginBottom:12 }}>
              <FormField label="Name of Session" required>
                <input style={inputStyle} placeholder="e.g. October 2026 — Session 1" value={newSession.label} onChange={e=>setNewSession(p=>({...p, label:e.target.value}))} />
              </FormField>
              <FormField label="Period Start" required>
                <input type="date" style={inputStyle} value={newSession.startDate} onChange={e=>setNewSession(p=>({...p, startDate:e.target.value}))} />
              </FormField>
              <FormField label="Period End" required>
                <input type="date" style={inputStyle} value={newSession.endDate} onChange={e=>setNewSession(p=>({...p, endDate:e.target.value}))} />
              </FormField>
            </div>
            <div style={{ fontSize:11, color:"#64748b", marginBottom:10 }}>New sessions are created with <Pill color="green">Open</Pill> status. SKs can immediately begin registering.</div>
            <div style={{ display:"flex", justifyContent:"flex-end" }}>
              <Btn variant="success" size="md" onClick={handleAddSession} style={{ opacity: newSession.label && newSession.startDate && newSession.endDate ? 1 : 0.4 }}>Add Session</Btn>
            </div>
          </div>
          <div style={{ display:"flex", justifyContent:"flex-end", marginTop:16 }}>
            <Btn variant="secondary" size="md" onClick={()=>setShowManageSessions(false)}>Close</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── SCM SYNC ────────────────────────────────────────────────────
function SCMSync() {
  const [deltas, setDeltas] = useState(SCM_DELTAS);
  const [selected, setSelected] = useState(new Set());
  const [showUpload, setShowUpload] = useState(false);
  const pending = deltas.filter(d => d.status === "Pending");
  const accepted = deltas.filter(d => d.status === "Accepted");
  const rejected = deltas.filter(d => d.status === "Rejected");

  const toggleSelect = (id) => { setSelected(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; }); };
  const selectAll = () => { if (selected.size === pending.length) setSelected(new Set()); else setSelected(new Set(pending.map(d => d.id))); };
  const handleAccept = () => { setDeltas(prev => prev.map(d => selected.has(d.id) ? { ...d, status: "Accepted" } : d)); setSelected(new Set()); };
  const handleReject = () => { setDeltas(prev => prev.map(d => selected.has(d.id) ? { ...d, status: "Rejected" } : d)); setSelected(new Set()); };

  return (
    <div>
      <div style={{ background:"linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)", border:"1px solid #f59e0b", borderRadius:10, padding:"14px 20px", marginBottom:14, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:14, fontWeight:700, color:"#92400e" }}>SCM Data Sync</div>
          <div style={{ fontSize:12, color:"#a16207" }}>Upload SCM extracts, review deltas, and approve changes to sync into SRS.</div>
        </div>
        <Btn variant="amber" size="md" onClick={()=>setShowUpload(true)}>Upload SCM Extract</Btn>
      </div>
      <SectionCard title="Upload History">
        <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
          <thead><tr style={{ background:"#f8fafc" }}>
            {["Upload Date","File Name","Records","Uploaded By","Status"].map(h => <th key={h} style={{ padding:"8px", textAlign:"left", fontWeight:600, color:"#475569", borderBottom:"1px solid #e2e8f0" }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {SCM_UPLOADS.map(u => (
              <tr key={u.id}>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{u.uploadDate}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontFamily:"monospace", fontSize:11 }}>{u.fileName}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{u.recordCount.toLocaleString()}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{u.uploadedBy}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color="green">{u.status}</Pill></td>
              </tr>
            ))}
          </tbody>
        </table>
      </SectionCard>
      <div style={{ display:"flex", gap:12, marginBottom:14 }}>
        <KpiCard label="Total Deltas" value={deltas.length} accent="#3b82f6" />
        <KpiCard label="Pending Review" value={pending.length} accent="#f59e0b" />
        <KpiCard label="Accepted" value={accepted.length} accent="#16a34a" />
        <KpiCard label="Rejected" value={rejected.length} accent="#dc2626" />
      </div>
      <SectionCard title="Review Deltas" style={{ padding:0, overflow:"hidden" }}
        headerRight={<div style={{ display:"flex", gap:8, padding:"0 20px" }}>
          <Btn variant="success" onClick={handleAccept} style={{ opacity: selected.size>0?1:0.4 }}>Accept Selected ({selected.size})</Btn>
          <Btn variant="danger" onClick={handleReject} style={{ opacity: selected.size>0?1:0.4 }}>Reject Selected ({selected.size})</Btn>
        </div>}>
        <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
          <thead><tr style={{ background:"#fffbeb" }}>
            <th style={{ padding:"10px 8px", textAlign:"left", borderBottom:"2px solid #fde68a" }}><input type="checkbox" checked={selected.size === pending.length && pending.length > 0} onChange={selectAll} /></th>
            {["Person Code","Name","Designation","Satsang Place","Field","SCM Previous","SCM New","SRS Current","Status"].map(h =>
              <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:600, color:"#92400e", borderBottom:"2px solid #fde68a", whiteSpace:"nowrap" }}>{h}</th>
            )}
          </tr></thead>
          <tbody>
            {deltas.map((d, idx) => (
              <tr key={d.id} style={{ background: d.status==="Accepted"?"#f0fdf4": d.status==="Rejected"?"#fef2f2": d.isNew?"#eff6ff": idx%2===0?"white":"#fffbeb" }}>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{d.status === "Pending" && <input type="checkbox" checked={selected.has(d.id)} onChange={()=>toggleSelect(d.id)} />}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontFamily:"monospace", fontSize:11 }}>{d.personCode}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontWeight:500 }}>{d.name}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color={DESIG_COLORS[d.designation]}>{d.designation}</Pill></td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{d.sp}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontWeight:600 }}>{d.isNew ? <Pill color="blue">New Record</Pill> : d.field}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", color:"#94a3b8", textDecoration: !d.isNew?"line-through":"none" }}>{d.scmPrevious}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", color:"#16a34a", fontWeight:500 }}>{d.scmNew}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", color:"#64748b" }}>{d.srsValue}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color={d.status==="Pending"?"amber": d.status==="Accepted"?"green":"red"}>{d.status}</Pill></td>
              </tr>
            ))}
          </tbody>
        </table>
      </SectionCard>
      {showUpload && (
        <Modal title="Upload SCM Extract" onClose={()=>setShowUpload(false)}>
          <div style={{ border:"2px dashed #d1d5db", borderRadius:10, padding:32, textAlign:"center", background:"#f8fafc" }}>
            <div style={{ fontSize:36, marginBottom:8 }}>{"📁"}</div>
            <div style={{ fontSize:14, fontWeight:600, color:"#374151" }}>Drop SCM Export file here</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginTop:4 }}>or click to browse {"—"} .xlsx files only</div>
          </div>
          <div style={{ marginTop:16, fontSize:12, color:"#64748b" }}>The system will compare this upload against the previous extract and identify all field-level changes (deltas).</div>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:16 }}>
            <Btn variant="secondary" onClick={()=>setShowUpload(false)}>Cancel</Btn>
            <Btn variant="primary" onClick={()=>setShowUpload(false)}>Process Upload</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── REPORTS ─────────────────────────────────────────────────────
function ReportsView({ role, functionaries, selectedState, selectedArea, selectedSP }) {
  const filtered = useMemo(() => {
    let f = functionaries;
    if (role === "state" && selectedState) f = f.filter(fn => fn.stateId === selectedState);
    if (role === "area" && selectedArea) f = f.filter(fn => fn.areaId === selectedArea);
    if (role === "sp" && selectedSP) f = f.filter(fn => fn.centreId === selectedSP);
    return f;
  }, [role, functionaries, selectedState, selectedArea, selectedSP]);

  const active = filtered.filter(f => f.presentStatus === "Active").length;
  const retired = filtered.filter(f => f.presentStatus === "Retired").length;
  const expiring = filtered.filter(f => f.isExpiringSoon).length;
  const totalChanges = filtered.reduce((sum, f) => sum + (f.changeLog ? f.changeLog.length : 0), 0);
  const funcsWithChanges = filtered.filter(f => f.changeLog && f.changeLog.length > 0).length;
  const fieldCounts = {};
  filtered.forEach(f => { if(f.changeLog) f.changeLog.forEach(cl => { fieldCounts[cl.field] = (fieldCounts[cl.field] || 0) + 1; }); });
  const fieldEntries = Object.entries(fieldCounts).sort((a,b) => b[1] - a[1]);
  const desigSummary = {};
  filtered.forEach(f => { desigSummary[f.designation] = (desigSummary[f.designation] || 0) + 1; });

  return (
    <div>
      <SectionCard title="Summary Report">
        <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:16 }}>
          <KpiCard label="Total" value={filtered.length} accent="#3b82f6" />
          <KpiCard label="Active" value={active} accent="#16a34a" />
          <KpiCard label="Retired" value={retired} accent="#94a3b8" />
          <KpiCard label="Expiring" value={expiring} accent="#f59e0b" />
        </div>
      </SectionCard>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
        <SectionCard title="Designation-wise Count">
          <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
            <thead><tr style={{ background:"#f8fafc" }}>
              <th style={{ padding:"6px 8px", textAlign:"left", fontWeight:600, color:"#475569", borderBottom:"1px solid #e2e8f0" }}>Designation</th>
              <th style={{ padding:"6px 8px", textAlign:"right", fontWeight:600, color:"#475569", borderBottom:"1px solid #e2e8f0" }}>Count</th>
            </tr></thead>
            <tbody>
              {Object.entries(desigSummary).sort((a,b)=>b[1]-a[1]).map(entry => (
                <tr key={entry[0]}>
                  <td style={{ padding:"6px 8px", borderBottom:"1px solid #f1f5f9" }}><Pill color={DESIG_COLORS[entry[0]]}>{entry[0]}</Pill></td>
                  <td style={{ padding:"6px 8px", borderBottom:"1px solid #f1f5f9", textAlign:"right", fontWeight:600 }}>{entry[1]}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </SectionCard>
        <SectionCard title="SCM Sync Changes Summary">
          <div style={{ marginBottom:12, fontSize:12, color:"#64748b" }}>{funcsWithChanges} functionaries updated via SCM sync, totalling {totalChanges} individual field changes.</div>
          {fieldEntries.length > 0 ? (
            <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
              <thead><tr style={{ background:"#f8fafc" }}>
                <th style={{ padding:"6px 8px", textAlign:"left", fontWeight:600, color:"#475569", borderBottom:"1px solid #e2e8f0" }}>Field Changed</th>
                <th style={{ padding:"6px 8px", textAlign:"right", fontWeight:600, color:"#475569", borderBottom:"1px solid #e2e8f0" }}>Count</th>
              </tr></thead>
              <tbody>
                {fieldEntries.map(entry => (
                  <tr key={entry[0]}>
                    <td style={{ padding:"6px 8px", borderBottom:"1px solid #f1f5f9" }}>{entry[0]}</td>
                    <td style={{ padding:"6px 8px", borderBottom:"1px solid #f1f5f9", textAlign:"right", fontWeight:600 }}>{entry[1]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : <div style={{ fontSize:12, color:"#94a3b8", textAlign:"center", padding:16 }}>No field changes recorded yet.</div>}
        </SectionCard>
      </div>
      <div style={{ marginTop:8 }}><Btn variant="primary" size="md">Export Report to Excel</Btn></div>
    </div>
  );
}

// ─── AUDIT LOG ───────────────────────────────────────────────────
function AuditLogView({ role, functionaries, selectedState, selectedArea, selectedSP }) {
  const [groupBy, setGroupBy] = useState("time");
  const allChanges = useMemo(() => {
    let f = functionaries;
    if (role === "state" && selectedState) f = f.filter(fn => fn.stateId === selectedState);
    if (role === "area" && selectedArea) f = f.filter(fn => fn.areaId === selectedArea);
    if (role === "sp" && selectedSP) f = f.filter(fn => fn.centreId === selectedSP);
    const changes = [];
    f.forEach(fn => { if(fn.changeLog) fn.changeLog.forEach(cl => { changes.push({ ...cl, funcName: fn.name, personCode: fn.personCode, designation: fn.designation, centreName: fn.centreName }); }); });
    return changes.sort((a,b) => b.changedAt.localeCompare(a.changedAt));
  }, [role, functionaries, selectedState, selectedArea, selectedSP]);

  return (
    <div>
      <SectionCard>
        <div style={{ display:"flex", gap:12, alignItems:"center" }}>
          <Select label="Group by:" value={groupBy} onChange={setGroupBy} options={[{value:"time",label:"Chronological"},{value:"func",label:"By Functionary"}]} />
          <div style={{ flex:1 }} />
          <div style={{ fontSize:12, color:"#94a3b8" }}>{allChanges.length} change entries</div>
          <Btn variant="primary" size="sm">Export Audit Log</Btn>
        </div>
      </SectionCard>
      <SectionCard title="Change History" style={{ padding:0, overflow:"hidden" }}>
        <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
          <thead><tr style={{ background:"#f8fafc" }}>
            {["Date/Time","Name","Person Code","Designation","Centre","Field","Old Value","New Value","Source","Status"].map(h =>
              <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:600, color:"#475569", borderBottom:"2px solid #e2e8f0", whiteSpace:"nowrap" }}>{h}</th>
            )}
          </tr></thead>
          <tbody>
            {allChanges.length > 0 ? allChanges.slice(0,50).map((cl, idx) => (
              <tr key={idx} style={{ background: idx%2===0?"white":"#fafbfc" }}>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontSize:11, color:"#64748b", whiteSpace:"nowrap" }}>{cl.changedAt}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontWeight:500 }}>{cl.funcName}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontFamily:"monospace", fontSize:11 }}>{cl.personCode}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color={DESIG_COLORS[cl.designation]}>{cl.designation}</Pill></td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}>{cl.centreName}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", fontWeight:600 }}>{cl.field}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", color:"#dc2626", textDecoration:"line-through" }}>{cl.oldValue}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9", color:"#16a34a", fontWeight:500 }}>{cl.newValue}</td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color="cyan">{cl.changeSource}</Pill></td>
                <td style={{ padding:"8px", borderBottom:"1px solid #f1f5f9" }}><Pill color={cl.approvalStatus==="Approved"?"green":"amber"}>{cl.approvalStatus}</Pill></td>
              </tr>
            )) : (
              <tr><td colSpan={10} style={{ padding:32, textAlign:"center", color:"#94a3b8" }}>No change entries to display.</td></tr>
            )}
          </tbody>
        </table>
      </SectionCard>
    </div>
  );
}

// ─── MAIN COMPONENT ──────────────────────────────────────────────
function FunctionaryManagement() {
  const [role, setRole] = useState("zone");
  const [subTab, setSubTab] = useState("dashboard");
  const [functionaries, setFunctionaries] = useState(MOCK_FUNCTIONARIES);
  const [sessions, setSessions] = useState(PROGRAMME_SESSIONS);
  const [selectedState, setSelectedState] = useState(STATES[0].id);
  const [selectedArea, setSelectedArea] = useState(AREAS[0].id);
  const [selectedSP, setSelectedSP] = useState(CENTRES[0].id);

  const roleTabs = [
    { id: "zone", label: "Zonal Office" },
    { id: "state", label: "State Office" },
    { id: "area", label: "Area HQ" },
    { id: "sp", label: "Satsang Place" },
  ];

  const getSubTabs = () => {
    const base = [
      { id: "dashboard", label: "Dashboard" },
      { id: "listing", label: "Functionary Listing" },
      { id: "programme", label: "SK Guidance Programme" },
    ];
    if (role === "zone") base.push({ id: "scmsync", label: "SCM Sync" });
    base.push({ id: "reports", label: "Reports" });
    base.push({ id: "audit", label: "Audit Log" });
    return base;
  };
  const subTabs = getSubTabs();

  const scopeSelector = () => {
    if (role === "zone") return null;
    return (
      <div style={{ display:"flex", gap:12, padding:"10px 0", flexWrap:"wrap" }}>
        {(role === "state" || role === "area" || role === "sp") && (
          <Select label="State:" value={selectedState} onChange={v=>setSelectedState(parseInt(v))} options={STATES.map(s=>({value:s.id,label:s.name}))} />
        )}
        {(role === "area" || role === "sp") && (
          <Select label="Area:" value={selectedArea} onChange={v=>setSelectedArea(parseInt(v))} options={AREAS.filter(a => {
            const st = STATES.find(s=>s.id===a.stateId);
            return st && st.id === selectedState;
          }).map(a=>({value:a.id,label:a.name}))} />
        )}
        {role === "sp" && (
          <Select label="Satsang Place:" value={selectedSP} onChange={v=>setSelectedSP(parseInt(v))} options={CENTRES.filter(c=>c.areaId===selectedArea).map(c=>({value:c.id,label:c.name}))} />
        )}
      </div>
    );
  };

  const renderContent = () => {
    const scope = { selectedState: selectedState, selectedArea: selectedArea, selectedSP: selectedSP };
    switch (subTab) {
      case "dashboard": return <Dashboard role={role} functionaries={functionaries} {...scope} />;
      case "listing": return <ListingView role={role} functionaries={functionaries} setFunctionaries={setFunctionaries} sessions={sessions} {...scope} />;
      case "programme": return <GuidanceProgramme role={role} functionaries={functionaries} sessions={sessions} setSessions={setSessions} {...scope} />;
      case "scmsync": return <SCMSync />;
      case "reports": return <ReportsView role={role} functionaries={functionaries} {...scope} />;
      case "audit": return <AuditLogView role={role} functionaries={functionaries} {...scope} />;
      default: return null;
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:"#f8fafc", fontFamily:'-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif' }}>
      <div style={{ background:"linear-gradient(135deg, #9b1c1c 0%, #7a1515 100%)", color:"white", padding:"20px 24px", boxShadow:"0 2px 8px rgba(0,0,0,0.08)" }}>
        <div style={{ maxWidth:1280, margin:"0 auto" }}>
          <div style={{ fontSize:11, letterSpacing:2, textTransform:"uppercase", opacity:0.85, marginBottom:4 }}>SRS Platform {"—"} Zone-II & III</div>
          <h1 style={{ margin:0, fontSize:22, fontWeight:700 }}>Functionary Data Management</h1>
          <div style={{ fontSize:13, opacity:0.88, marginTop:2 }}>Manage functionary records, track approvals, and coordinate SK Guidance Programmes</div>
        </div>
      </div>
      <div style={{ background:"white", borderBottom:"1px solid #e2e8f0", position:"sticky", top:0, zIndex:20 }}>
        <div style={{ maxWidth:1280, margin:"0 auto", display:"flex", gap:0 }}>
          {roleTabs.map(t => (
            <button key={t.id} onClick={() => { setRole(t.id); setSubTab("dashboard"); }}
              style={{ padding:"12px 20px", border:"none", borderBottom: role===t.id?"3px solid #9b1c1c":"3px solid transparent", background: role===t.id?"#fef2f2":"transparent", color: role===t.id?"#9b1c1c":"#64748b", fontSize:13, fontWeight: role===t.id?700:500, cursor:"pointer", transition:"all 0.15s" }}>
              {t.label}
            </button>
          ))}
          <div style={{ flex:1 }} />
          <div style={{ display:"flex", alignItems:"center", padding:"0 16px", fontSize:12, color:"#94a3b8" }}>{functionaries.length} functionaries in registry</div>
        </div>
      </div>
      <div style={{ background: subTab==="scmsync" ? "#fffbeb" : "#f8fafc", borderBottom:"1px solid #e2e8f0", position:"sticky", top:45, zIndex:15 }}>
        <div style={{ maxWidth:1280, margin:"0 auto", display:"flex", gap:0, paddingTop:2 }}>
          {subTabs.map(t => {
            const isActive = subTab === t.id;
            const isSCMTab = t.id === "scmsync";
            return (
              <button key={t.id} onClick={() => setSubTab(t.id)}
                style={{ padding:"10px 16px", border:"none",
                  borderBottom: isActive ? (isSCMTab ? "2px solid #f59e0b" : "2px solid #3b82f6") : "2px solid transparent",
                  background: isActive ? (isSCMTab ? "#fffbeb" : "white") : "transparent",
                  color: isActive ? (isSCMTab ? "#92400e" : "#1e40af") : "#64748b",
                  fontSize:12, fontWeight: isActive?700:500, cursor:"pointer", transition:"all 0.15s" }}>
                {t.label}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ maxWidth:1280, margin:"0 auto", padding:"0 24px" }}>{scopeSelector()}</div>
      <div style={{ maxWidth:1280, margin:"0 auto", padding:"12px 24px 80px" }}>{renderContent()}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FunctionaryManagement />);
</script>
</body>
</html>
